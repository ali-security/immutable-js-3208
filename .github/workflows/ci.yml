name: CI

on:
  push:
    branches: ['*']

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: '8'
      - run: npm install --ignore-scripts
      - name: Run tests
        env:
          TRAVIS: 'true'
        run: |
          node -e "
            Promise.defer = function() { var d = {}; d.promise = new Promise(function(r, j) { d.resolve = r; d.reject = j; }); return d; };
            require('jest-cli/bin/jest').run(['--config', JSON.stringify({testPathDirs: ['__tests__'], moduleFileExtensions: ['js','ts'], transform: {'^.+\\\\.ts$': '<rootDir>/resources/jestPreprocessor.js'}, testRegex: '/__tests__/.*\\\\.ts$'})]);
          "
      - name: Verify CVE fix
        run: |
          node -e "
            var Immutable = require('./dist/immutable');
            var Map = Immutable.Map;
            var errors = [];
            var m1 = Map({user: 'alice'}).set('__proto__', {admin: true});
            if (m1.toObject().admin !== undefined) errors.push('toObject');
            if (m1.toJS().admin !== undefined) errors.push('toJS');
            Immutable.fromJS({}).mergeDeep(JSON.parse('{\"__proto__\":{\"admin\":true}}'));
            if (({}).admin !== undefined) errors.push('mergeDeep');
            if (errors.length > 0) { console.error('FAILED:', errors); process.exit(1); }
            console.log('CVE-2026-29063 fix verified');
          "
